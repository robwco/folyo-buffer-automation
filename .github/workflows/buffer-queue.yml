name: Queue Posts to Buffer

on:
  workflow_dispatch:

jobs:
  queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Queue posts to Buffer
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
        run: |
          python3 << 'EOF'
          import json
          import subprocess
          import os
          import sys

          API_KEY = os.environ["BUFFER_API_KEY"]
          ENDPOINT = "https://api.buffer.com"

          CHANNELS = {
              "Personal (rob-williams)": "6840bc4bd6d25b49a15740c5",
              "Folyo company page":      "6840bc4bd6d25b49a15740ef",
          }

          try:
              with open("posts.txt", "r", encoding="utf-8") as f:
                  raw = f.read()
          except FileNotFoundError:
              print("❌  posts.txt not found in the repo root.")
              sys.exit(1)

          posts = [p.strip() for p in raw.split("---") if p.strip()]

          if not posts:
              print("❌  No posts found in posts.txt. Separate posts with ---")
              sys.exit(1)

          def queue_post(text, channel_id):
              safe_text = text.replace("\\", "\\\\").replace('"', '\\"').replace("\n", "\\n")
              query = f"""mutation {{
                createPost(input: {{
                  text: "{safe_text}",
                  channelId: "{channel_id}",
                  schedulingType: automatic,
                  mode: queued
                }}) {{
                  ... on PostActionSuccess {{
                    post {{ id }}
                  }}
                  ... on MutationError {{
                    message
                  }}
                }}
              }}"""
              payload = json.dumps({"query": query})
              result = subprocess.run(
                  ["curl", "-s", "-X", "POST", ENDPOINT,
                   "-H", "Content-Type: application/json",
                   "-H", f"Authorization: Bearer {API_KEY}",
                   "-d", payload],
                  capture_output=True, text=True
              )
              data = json.loads(result.stdout)
              if "errors" in data:
                  raise Exception(data["errors"][0]["message"])
              action = data["data"]["createPost"]
              if "message" in action:
                  raise Exception(action["message"])
              return action["post"]["id"]

          print(f"Found {len(posts)} post(s). Queuing to {len(CHANNELS)} channels...\n")

          total = len(posts) * len(CHANNELS)
          success = 0

          for i, post in enumerate(posts, 1):
              preview = post[:60].replace("\n", " ")
              print(f'Post {i}/{len(posts)}: "{preview}{"..." if len(post) > 60 else ""}"')
              for channel_name, channel_id in CHANNELS.items():
                  try:
                      post_id = queue_post(post, channel_id)
                      print(f"  ✅  {channel_name} → queued (id: {post_id})")
                      success += 1
                  except Exception as e:
                      print(f"  ❌  {channel_name} → FAILED: {e}")
              print()

          print(f"Done! {success}/{total} posts queued successfully.")
          if success < total:
              sys.exit(1)
          EOF
